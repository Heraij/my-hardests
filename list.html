<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Creator+ - Hardests</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Table interactive row rules */
        tbody tr { cursor: pointer; }
        tbody tr:hover td { background-color: var(--row-hover) !important; }

        /* ------------------------------------------
           SUBPAGE SHOWCASE COMPONENT STYLES
        ------------------------------------------ */
        .subpage-container {
            animation: fadeIn 0.4s ease;
            text-align: center;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .subpage-header {
            margin-bottom: 1.5rem;
        }
        .subpage-header h2 {
            font-size: 2.2rem;
            color: #fff;
            margin-bottom: 0.2rem;
        }
        .subpage-header p {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        /* Large Centered Showcase Video Box */
        .subpage-video-frame {
            width: 100%;
            aspect-ratio: 16 / 9;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border-color);
            margin-bottom: 2rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .subpage-video-frame iframe {
            width: 100%;
            height: 100%;
            border: 0;
        }

        /* Metrics Horizontal Flex Layout */
        .metrics-row {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 15px;
            margin-bottom: 2rem;
        }
        .metric-card {
            background: #181b22;
            border: 1px solid var(--border-color);
            padding: 1rem;
            border-radius: 8px;
        }
        .metric-card span {
            display: block;
            font-size: 0.75rem;
            text-transform: uppercase;
            color: var(--text-muted);
            letter-spacing: 1px;
            margin-bottom: 4px;
        }
        .metric-card strong {
            font-size: 1.3rem;
            color: var(--accent-color);
        }

        /* Custom Italics Thoughts Blockquote */
        .thoughts-box {
            font-style: italic;
            color: #cbd5e1;
            font-size: 1.1rem;
            line-height: 1.6;
            max-width: 700px;
            margin: 0 auto 2.5rem auto;
            padding: 0 1.5rem;
            border-left: 3px solid var(--border-color);
            text-align: left;
        }

        .back-btn {
            display: inline-block;
            background-color: #181b22;
            border: 1px solid var(--border-color);
            color: #fff;
            padding: 10px 20px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: bold;
            transition: all 0.2s;
        }
        .back-btn:hover {
            border-color: var(--accent-color);
            background-color: #242936;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1 id="user-name"></h1>
            <p id="user-desc"></p>
        </header>

        <div class="nav-menu">
            <a href="index.html" class="nav-btn">Main</a>
            <a href="list.html" class="nav-btn active">List</a>
            <a href="stats.html" class="nav-btn">Stats</a>
            <a href="levels.html" class="nav-btn">Levels</a>
        </div>

        <!-- MAIN OVERVIEW VIEW CONTAINER -->
        <div id="main-list-view">
            <table>
                <thead>
                    <tr>
                        <th style="text-align: center;">Rank</th>
                        <th>Level / Creator</th>
                        <th>Showcase</th>
                    </tr>
                </thead>
                <tbody id="demonlist-body"></tbody>
            </table>
            <div class="disclaimer-note">Click level to view more info.</div>
        </div>

        <!-- SPECIFIC SINGLE LEVEL SUBPAGE CONTAINER -->
        <div id="single-level-view" class="subpage-container" style="display: none;">
            <!-- Content will generate dynamically via routing parameters -->
        </div>
    </div>

    <script src="demonlist-data.js"></script>
    <script>
        window.onload = function() {
            initGlobalLayout();
            
            const listView = document.getElementById('main-list-view');
            const singleView = document.getElementById('single-level-view');
            
            // Core Query Routing Parser: Reads url suffix parameters (e.g., ?9)
            const queryParam = window.location.search.substring(1);
            const targetRank = parseInt(queryParam, 10);

            if (!isNaN(targetRank) && targetRank > 0 && targetRank <= DATA.demonlist.length) {
                // If a rank match query parameter exists, instantly load the subpage configuration view
                listView.style.display = "none";
                singleView.style.display = "block";
                renderLevelSubpage(targetRank - 1);
            } else {
                // Otherwise, display standard default main listing dashboard table chart
                listView.style.display = "block";
                singleView.style.display = "none";
                renderMainTable();
            }

            // 1. Build normal list layout summary rows
            function renderMainTable() {
                const tbody = document.getElementById('demonlist-body');
                DATA.demonlist.forEach((item, index) => {
                    const tr = document.createElement('tr');
                    const currentRank = index + 1;
                    
                    let diffHtml = '';
if (item.difficulty) {
    const clean = item.difficulty.toLowerCase().trim();
    
    let gClass = '';
    if (clean.includes('easy')) gClass = 'easy-demon';
    else if (clean.includes('medium')) gClass = 'medium-demon';
    else if (clean.includes('hard')) gClass = 'hard-demon';
    else if (clean.includes('insane')) gClass = 'insane-demon';
    else if (clean.includes('extreme')) gClass = 'extreme-demon';
    
    diffHtml = ` • <span class="diff-tag ${gClass}">${item.difficulty}</span>`;
}
                    
                    const vId = getYouTubeId(item.video);
                    const thumb = vId ? `<img src="https://img.youtube.com/vi/${vId}/mqdefault.jpg" class="yt-thumb">` : '';
                    
                    tr.innerHTML = `
                        <td class="rank-col">#${currentRank}</td>
                        <td><div class="level-name">${item.level}</div><div class="creator-name">by ${item.creator}${diffHtml}</div></td>
                        <td><div class="showcase-cell">${thumb}<span class="video-link">View Stats</span></div></td>`;
                    
                    // Route users directly onto query extension path link upon row select
                    tr.onclick = function() {
                        window.location.search = `?${currentRank}`;
                    };
                    tbody.appendChild(tr);
                });
            }

            // 2. Build full dedicated screen layout view for target individual completions
            function renderLevelSubpage(indexOffset) {
    const item = DATA.demonlist[indexOffset];
    const videoId = getYouTubeId(item.video);
    
    // NAME-BASED CHECKER: Checks the title directly (ignoring spaces or capital letters)
    if (item.level.toLowerCase().trim() === "nine circles") {
        document.body.classList.add('nine-circles-hell-mode');
    } else {
        document.body.classList.remove('nine-circles-hell-mode');
    }

    const enjoyment = item.enjoyment || "N/A";
    const attempts = item.attempts ? item.attempts.toLocaleString() : "N/A";
    const dateAdded = item.dateAdded || "Unspecified Date";
    const thoughts = item.thoughts || "No custom analytical thoughts left for this entry.";

    singleView.innerHTML = `
        <div class="subpage-header">
            <h2>${item.level}</h2>
            <p>Completed Hardest Ranked #${indexOffset + 1} • by ${item.creator}</p>
        </div>

        <div class="subpage-video-frame">
            ${videoId ? `
                <iframe 
                    src="https://www.youtube.com/embed/${videoId}" 
                    title="Completion Showcase Video" 
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                    allowfullscreen>
                </iframe>` : `<div style="display:flex; align-items:center; justify-content:center; height:100%; color:var(--text-muted);">No showcase video available.</div>`}
        </div>

        <div class="metrics-row">
            <div class="metric-card"><span>Enjoyability</span><strong>${enjoyment}</strong></div>
            <div class="metric-card"><span>Attempts</span><strong>${attempts}</strong></div>
            <div class="metric-card"><span>Date Logged</span><strong>${dateAdded}</strong></div>
        </div>

        <div class="thoughts-box">
            "${thoughts}"
        </div>

        <a href="list.html" class="back-btn">← Return to List</a>
    `;
}
        };
    </script>
</body>
</html>
