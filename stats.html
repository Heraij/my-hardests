<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Statistics</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Time Machine Controls Style */
        .time-machine-box {
            background: linear-gradient(135deg, #1e1b4b, #111827);
            border: 2px solid #6366f1;
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            text-align: center;
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.2);
        }
        .time-machine-box h3 {
            color: #818cf8;
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 0.8rem;
        }
        .timeline-slider {
            width: 100%;
            max-width: 400px;
            accent-color: #6366f1;
            margin: 10px 0;
            cursor: pointer;
        }
        .current-time-display {
            font-size: 1.2rem;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 8px rgba(255,255,255,0.3);
            margin-top: 5px;
        }

        /* Panel Grid Rules */
        .stats-panel-layout, .socials-panel-layout {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 2.5rem;
        }
        .panel-row-split {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        .stat-panel, .social-panel {
            background-color: #181b22;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 1.2rem;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
        }
        .stat-panel h4, .social-panel h4 {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
        }
        .stat-panel p, .social-panel p {
            font-size: 1.6rem;
            font-weight: bold;
            color: #fff;
        }
        .social-panel p {
            font-size: 1.3rem;
            color: var(--accent-color);
        }
        .post-panel {
            background-color: #14161d;
            border: 1px dashed var(--border-color);
            padding: 1.5rem;
            border-radius: 8px;
            color: #fff;
            font-style: italic;
            margin-top: 0.5rem;
            line-height: 1.5;
            text-align: center;
            font-size: 1.05rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1 id="user-name"></h1>
            <p id="user-desc"></p>
        </header>

        <div class="nav-menu">
            <a href="index.html" class="nav-btn">Main</a>
            <a href="list.html" class="nav-btn">List</a>
            <a href="stats.html" class="nav-btn active">Stats</a>
            <a href="levels.html" class="nav-btn">Levels</a>
        </div>

        <!-- TIME MACHINE HUB INTERFACE -->
        <div class="time-machine-box">
            <h3>⏳ GD Progress Time Machine</h3>
            <input type="range" id="time-slider" class="timeline-slider" min="0" max="0" value="0">
            <div id="time-display" class="current-time-display">Connecting Temporal Anchor...</div>
        </div>

        <!-- The core structural panels layout area -->
        <div class="stats-panel-layout" id="stats-panel-container">
            <div class="stat-panel" style="color:var(--text-muted);">Syncing database timelines...</div>
        </div>

        <h3 style="margin-bottom: 1rem; text-transform: uppercase; letter-spacing: 1px; font-size: 1.3rem;">Connect With Me</h3>
        <div class="socials-panel-layout" id="socials-panel-container"></div>

        <h3 style="text-transform: uppercase; letter-spacing: 1px; font-size: 1.3rem;">Profile Post At That Moment</h3>
        <div id="profile-post-container" class="post-panel">---</div>
    </div>

    <script src="demonlist-data.js"></script>
    <script>
        window.onload = function() {
            initGlobalLayout();
            
            // 1. Fetch live profile stats first
            fetch(`https://gdbrowser.com/api/profile/${DATA.gdUsername}`)
                .then(res => res.json())
                .then(player => {
                    if (!player || player.error) throw new Error("API issues");

                    const todayStr = new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
                    
                    const currentStats = {
                        date: `${todayStr} (Today - Live)`,
                        stars: player.stars || 0,
                        moons: player.moons || 0,
                        demons: player.demons || 0,
                        cp: player.cp || 0,
                        coins: player.coins || 0,
                        userCoins: player.userCoins || 0,
                        post: player.post ? `"${player.post}"` : "No profile post found."
                    };

                    // 2. Load historical array from local storage, or start blank if it's the first time
                    let localHistory = JSON.parse(localStorage.getItem('gd_stats_history')) || [];

                    // 3. Daily Checker: Look to see if we already recorded today's entry
                    const todayStripped = todayStr + " (Today - Live)";
                    // Filter out any stale "Today" entry so it replaces it with fresh numbers
                    localHistory = localHistory.filter(item => !item.date.includes("(Today - Live)"));
                    
                    // Add the fresh snapshot at the beginning of our chronological timeline
                    localHistory.unshift(currentStats);

                    // If you want to log permanent past days, it checks if a non-live version of today exists
                    const staticDateLabel = todayStr;
                    const dayAlreadyLogged = localHistory.some(item => item.date === staticDateLabel);
                    
                    if (!dayAlreadyLogged) {
                        // Duplicate current snapshot but label it permanently as a historical day!
                        const archiveDay = { ...currentStats, date: staticDateLabel };
                        // Push it right under the live entry
                        localHistory.splice(1, 0, archiveDay);
                    }

                    // Save the updated list back to the browser's hard drive
                    localStorage.setItem('gd_stats_history', JSON.stringify(localHistory));

                    // 4. Fire up the slider logic
                    setupTimelineSlider(localHistory);
                })
                .catch(err => {
                    console.error(err);
                    // Fallback to offline stored data if game servers are acting up
                    const localHistory = JSON.parse(localStorage.getItem('gd_stats_history')) || [];
                    if (localHistory.length > 0) {
                        setupTimelineSlider(localHistory);
                    } else {
                        document.getElementById('stats-panel-container').innerHTML = 
                            `<div class="stat-panel" style="color:#ef4444;">Could not fetch live profile and no historical database exists yet! Check back tomorrow.</div>`;
                    }
                });

            function setupTimelineSlider(historyArray) {
                const slider = document.getElementById('time-slider');
                const timeDisplay = document.getElementById('time-display');

                slider.max = historyArray.length - 1;
                slider.value = 0; // Lock handle to position 0 (The Live view)

                function updateView(index) {
                    const data = historyArray[index];
                    timeDisplay.textContent = data.date;

                    document.getElementById('stats-panel-container').innerHTML = `
                        <div class="panel-row-split">
                            <div class="stat-panel"><h4>Stars</h4><p>${data.stars.toLocaleString()}</p></div>
                            <div class="stat-panel"><h4>Moons</h4><p>${data.moons.toLocaleString()}</p></div>
                        </div>
                        <div class="stat-panel"><h4>Demons</h4><p>${data.demons.toLocaleString()}</p></div>
                        <div class="stat-panel"><h4>Creator Points</h4><p>${data.cp.toLocaleString()}</p></div>
                        <div class="panel-row-split">
                            <div class="stat-panel"><h4>Main Coins</h4><p>${data.coins.toLocaleString()}</p></div>
                            <div class="stat-panel"><h4>User Coins</h4><p>${data.userCoins.toLocaleString()}</p></div>
                        </div>
                    `;
                    document.getElementById('profile-post-container').textContent = data.post;
                }

                slider.oninput = function() { updateView(this.value); };
                updateView(0); // Initialize first view
            }

            // Simple static social box generator
            const scBox = document.getElementById('socials-panel-container');
            const targetedSocials = DATA.socials ? DATA.socials : { "YouTube": "@Heraijs", "Discord": "xyz" };
            let socialHtml = '<div class="panel-row-split">';
            Object.entries(targetedSocials).forEach(([platform, handle]) => {
                socialHtml += `<div class="social-panel"><h4>${platform.toUpperCase()}</h4><p>${handle}</p></div>`;
            });
            socialHtml += '</div>';
            scBox.innerHTML = socialHtml;
        };
    </script>
</body>
</html>
