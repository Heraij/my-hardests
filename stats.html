<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Statistics</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* custom grid layout to match your exact block representation */
        .gd-stats-board {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 2.5rem;
        }
        .full-width {
            grid-column: span 2;
        }
        .profile-post-box {
            background-color: #14161d;
            border: 1px dashed var(--border-color);
            padding: 1.2rem;
            border-radius: 8px;
            color: #fff;
            font-style: italic;
            margin-top: 0.5rem;
            line-height: 1.4;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1 id="user-name"></h1>
            <p id="user-desc"></p>
        </header>

        <div class="nav-menu">
            <a href="index.html" class="nav-btn">Main</a>
            <a href="list.html" class="nav-btn">List</a>
            <a href="stats.html" class="nav-btn active">Stats</a>
            <a href="levels.html" class="nav-btn">Levels</a>
        </div>

        <!-- Rebuilt to form your exact setup structure mapping -->
        <div class="gd-stats-board" id="stats-board-container">
            <div class="stat-card full-width" style="color: var(--text-muted); text-align: center;">
                Syncing Geometry Dash account profile...
            </div>
        </div>

        <h3 style="margin-bottom: 1rem; text-transform: uppercase; letter-spacing: 1px; font-size: 1.3rem;">Connect With Me</h3>
        <div class="socials-list" id="socials-container" style="margin-bottom: 2.5rem;"></div>

        <h3 style="text-transform: uppercase; letter-spacing: 1px; font-size: 1.3rem;">Most Recent Profile Post</h3>
        <div id="profile-post-container" class="profile-post-box">Loading post...</div>
    </div>

    <script src="demonlist-data.js"></script>
    <script>
        window.onload = function() {
            initGlobalLayout();
            const board = document.getElementById('stats-board-container');
            const postBox = document.getElementById('profile-post-container');
            const scBox = document.getElementById('socials-container');

            fetch(`https://gdbrowser.com/api/profile/${DATA.gdUsername}`)
                .then(res => res.json())
                .then(player => {
                    if (!player || player.error) {
                        board.innerHTML = `<div class="stat-card full-width" style="color: #ef4444;">Failed to parse profile data.</div>`;
                        postBox.textContent = "Unavailable";
                        return;
                    }

                    // 1. Render data into your specific structural block design layout
                    board.innerHTML = `
                        <div class="stat-card"><h4>Stars</h4><p>${player.stars || 0}</p></div>
                        <div class="stat-card"><h4>Moons</h4><p>${player.moons || 0}</p></div>
                        <div class="stat-card full-width"><h4>Demons</h4><p>${player.demons || 0}</p></div>
                        <div class="stat-card full-width"><h4>Creator Points</h4><p>${player.cp || 0}</p></div>
                        <div class="stat-card"><h4>Main Coins</h4><p>${player.coins || 0}</p></div>
                        <div class="stat-card"><h4>User Coins</h4><p>${player.userCoins || 0}</p></div>
                    `;

                    // 2. Extract your latest live game feed profile status comment statement
                    postBox.textContent = player.post ? `"${player.post}"` : "No recent profile posts found.";
                })
                .catch(err => {
                    board.innerHTML = `<div class="stat-card full-width" style="color: #ef4444;">Error reading server database API data.</div>`;
                    postBox.textContent = "Error pulling feed updates.";
                });

            // 3. Fallback check parser rendering for connection methods tags list loop 
            scBox.innerHTML = '';
            const targetedSocials = DATA.socials ? DATA.socials : { "YouTube": "@HeraijsGD", "Discord": "heraijs_xyz" };
            Object.entries(targetedSocials).forEach(([p, u]) => {
                scBox.innerHTML += `<div class="social-item">${p.toUpperCase()}<span>${u}</span></div>`;
            });
        };
    </script>
</body>
</html>
