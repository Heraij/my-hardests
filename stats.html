<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Statistics</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1 id="user-name"></h1>
            <p id="user-desc"></p>
        </header>

        <div class="nav-menu">
            <a href="index.html" class="nav-btn">Main</a>
            <a href="list.html" class="nav-btn">List</a>
            <a href="stats.html" class="nav-btn active">Stats</a>
            <a href="levels.html" class="nav-btn">Levels</a>
        </div>

        <!-- This keeps your precise original layout container structure -->
        <div class="stats-grid" id="stats-container" style="margin-bottom: 2.5rem;">
            <div class="stat-card" style="grid-column: span 2; color: var(--text-muted);">Syncing live numbers...</div>
        </div>

        <h3 style="margin-bottom: 1rem; text-transform: uppercase; letter-spacing: 1px; font-size: 1.3rem;">Connect With Me</h3>
        <div class="socials-list" id="socials-container"></div>
    </div>

    <script src="demonlist-data.js"></script>
    <script>
        window.onload = function() {
            initGlobalLayout();
            const sBox = document.getElementById('stats-container');
            const scBox = document.getElementById('socials-container');

            // 1. Fetch live profile stats from the GD Browser API
            fetch(`https://gdbrowser.com/api/profile/${DATA.gdUsername}`)
                .then(res => res.json())
                .then(player => {
                    if (!player || player.error) {
                        sBox.innerHTML = `<div class="stat-card" style="grid-column: span 2; color: #ef4444;">Could not load live player stats.</div>`;
                        return;
                    }
                    
                    // Maps the live numbers to match your exact card keys structure
                    const liveStats = {
                        "Stars": player.stars || 0,
                        "Diamonds": player.diamonds || 0,
                        "Secret Coins": player.coins || 0,
                        "User Coins": player.userCoins || 0,
                        "Demons Beaten": player.demons || 0,
                        "Creator Points": player.cp || 0,
                        "Global Rank": player.rank ? `#${player.rank.toLocaleString()}` : "Unranked"
                    };

                    // Clears the loading text and dynamically appends your specific card UI format
                    sBox.innerHTML = '';
                    Object.entries(liveStats).forEach(([k, v]) => {
                        sBox.innerHTML += `<div class="stat-card"><h4>${k}</h4><p>${v}</p></div>`;
                    });
                })
                .catch(err => {
                    sBox.innerHTML = `<div class="stat-card" style="grid-column: span 2; color: #ef4444;">Error connecting to GD Browser.</div>`;
                });

            // 2. Safely load your fallback hardcoded custom socials cards underneath
            scBox.innerHTML = '';
            // If DATA.socials exists in your data file, loop through it
            if (DATA.socials) {
                Object.entries(DATA.socials).forEach(([p, u]) => {
                    scBox.innerHTML += `<div class="social-item">${p.toUpperCase()}<span>${u}</span></div>`;
                });
            } else {
                // Quick placeholders in case you haven't written the object keys yet
                const defaultSocials = { "YouTube": "@HeraijsGD", "Discord": "heraijs_xyz" };
                Object.entries(defaultSocials).forEach(([p, u]) => {
                    scBox.innerHTML += `<div class="social-item">${p.toUpperCase()}<span>${u}</span></div>`;
                });
            }
        };
    </script>
</body>
</html>
