<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Statistics</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Time Machine Controls Style */
        .time-machine-box {
            background: linear-gradient(135deg, #1e1b4b, #111827);
            border: 2px solid #6366f1;
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            text-align: center;
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.2);
        }
        .time-machine-box h3 {
            color: #818cf8;
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 0.8rem;
        }
        .timeline-slider {
            width: 100%;
            max-width: 400px;
            accent-color: #6366f1;
            margin: 10px 0;
            cursor: pointer;
        }
        .current-time-display {
            font-size: 1.2rem;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 8px rgba(255,255,255,0.3);
            margin-top: 5px;
        }

        /* Standard layout alignment rules */
        .stats-panel-layout, .socials-panel-layout {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 2.5rem;
        }
        .panel-row-split {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        .stat-panel, .social-panel {
            background-color: #181b22;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 1.2rem;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .stat-panel h4, .social-panel h4 {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
        }
        .stat-panel p, .social-panel p {
            font-size: 1.6rem;
            font-weight: bold;
            color: #fff;
        }
        .social-panel p {
            font-size: 1.3rem;
            color: var(--accent-color);
        }
        .post-panel {
            background-color: #14161d;
            border: 1px dashed var(--border-color);
            padding: 1.5rem;
            border-radius: 8px;
            color: #fff;
            font-style: italic;
            margin-top: 0.5rem;
            line-height: 1.5;
            text-align: center;
            font-size: 1.05rem;
            box-shadow: inset 0 2px 8px rgba(0,0,0,0.4);
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1 id="user-name"></h1>
            <p id="user-desc"></p>
        </header>

        <div class="nav-menu">
            <a href="index.html" class="nav-btn">Main</a>
            <a href="list.html" class="nav-btn">List</a>
            <a href="stats.html" class="nav-btn active">Stats</a>
            <a href="levels.html" class="nav-btn">Levels</a>
        </div>

        <!-- THE TIME MACHINE HUB INTERFACE -->
        <div class="time-machine-box">
            <h3>⏳ GD Progress Time Machine</h3>
            <input type="range" id="time-slider" class="timeline-slider" min="0" max="0" value="0">
            <div id="time-display" class="current-time-display">Loading Temporal Anchor...</div>
        </div>

        <!-- The core structural panels layout area -->
        <div class="stats-panel-layout" id="stats-panel-container"></div>

        <h3 style="margin-bottom: 1rem; text-transform: uppercase; letter-spacing: 1px; font-size: 1.3rem;">Connect With Me</h3>
        <div class="socials-panel-layout" id="socials-panel-container"></div>

        <h3 style="text-transform: uppercase; letter-spacing: 1px; font-size: 1.3rem;">Profile Post At That Moment</h3>
        <div id="profile-post-container" class="post-panel">Loading...</div>
    </div>

    <script src="demonlist-data.js"></script>
    <script>
        let cachedLiveSnapshot = null; // Saves API response to avoid redundant fetches

        window.onload = function() {
            initGlobalLayout();
            
            const history = DATA.statsHistory || [{ date: "Live Profile Only", isLive: true }];
            const slider = document.getElementById('time-slider');
            const timeDisplay = document.getElementById('time-display');

            // Configure slider spectrum parameters based on array dimensions
            slider.max = history.length - 1;
            slider.value = 0; // Initialize at index 0 (the top latest item)

            // UI updating function wrapper
            function renderTimeEra(index) {
                const snapshot = history[index];
                timeDisplay.textContent = snapshot.date;

                if (snapshot.isLive) {
                    if (cachedLiveSnapshot) {
                        applyStatsToPanels(cachedLiveSnapshot);
                    } else {
                        document.getElementById('stats-panel-container').innerHTML = `<div class="stat-panel" style="color:var(--text-muted);">Opening portal to live GD servers...</div>`;
                        fetch(`https://gdbrowser.com/api/profile/${DATA.gdUsername}`)
                            .then(res => res.json())
                            .then(player => {
                                if (!player || player.error) throw new Error();
                                cachedLiveSnapshot = {
                                    stars: player.stars || 0,
                                    moons: player.moons || 0,
                                    demons: player.demons || 0,
                                    cp: player.cp || 0,
                                    coins: player.coins || 0,
                                    userCoins: player.userCoins || 0,
                                    post: player.post ? `"${player.post}"` : "No recent profile updates found."
                                };
                                applyStatsToPanels(cachedLiveSnapshot);
                            })
                            .catch(() => {
                                document.getElementById('stats-panel-container').innerHTML = `<div class="stat-panel" style="color:#ef4444;">API Sync Error. Slide to older dates to read data cache logs!</div>`;
                            });
                    }
                } else {
                    // Instantly render recorded historical numbers
                    applyStatsToPanels(snapshot);
                }
            }

            function applyStatsToPanels(data) {
                document.getElementById('stats-panel-container').innerHTML = `
                    <div class="panel-row-split">
                        <div class="stat-panel"><h4>Stars</h4><p>${data.stars}</p></div>
                        <div class="stat-panel"><h4>Moons</h4><p>${data.moons}</p></div>
                    </div>
                    <div class="stat-panel"><h4>Demons</h4><p>${data.demons}</p></div>
                    <div class="stat-panel"><h4>Creator Points</h4><p>${data.cp}</p></div>
                    <div class="panel-row-split">
                        <div class="stat-panel"><h4>Main Coins</h4><p>${data.coins}</p></div>
                        <div class="stat-panel"><h4>User Coins</h4><p>${data.userCoins}</p></div>
                    </div>
                `;
                document.getElementById('profile-post-container').textContent = data.post || "No record of status message.";
            }

            // Hook up listeners to respond immediately when user drags the timeline handle
            slider.oninput = function() { renderTimeEra(this.value); };
            
            // Fire up initial view load
            renderTimeEra(0);

            // Populate Social links
            const scBox = document.getElementById('socials-panel-container');
            const targetedSocials = DATA.socials ? DATA.socials : { "YouTube": "@Heraijs", "Discord": "xyz" };
            let socialHtml = '<div class="panel-row-split">';
            Object.entries(targetedSocials).forEach(([platform, handle]) => {
                socialHtml += `<div class="social-panel"><h4>${platform.toUpperCase()}</h4><p>${handle}</p></div>`;
            });
            socialHtml += '</div>';
            scBox.innerHTML = socialHtml;
        };
    </script>
</body>
</html>
