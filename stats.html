<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Live Stats</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1 id="user-name"></h1>
            <p id="user-desc"></p>
        </header>

        <div class="nav-menu">
            <a href="index.html" class="nav-btn">Main</a>
            <a href="list.html" class="nav-btn">List</a>
            <a href="stats.html" class="nav-btn active">Stats</a>
            <a href="levels.html" class="nav-btn">Levels</a>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Stat Type</th>
                    <th>Current Record</th>
                </tr>
            </thead>
            <tbody id="stats-table-body">
                <tr>
                    <td colspan="2" style="text-align: center; color: var(--text-muted);">Syncing live player metrics from GD Browser...</td>
                </tr>
            </tbody>
        </table>
    </div>

    <script src="demonlist-data.js"></script>
    <script>
        window.onload = function() {
            initGlobalLayout();
            const tbody = document.getElementById('stats-table-body');

            fetch(`https://gdbrowser.com/api/profile/${DATA.gdUsername}`)
                .then(res => res.json())
                .then(player => {
                    if (!player || player.error) {
                        tbody.innerHTML = `<tr><td colspan="2" style="text-align:center; color:#ef4444;">Could not sync player data.</td></tr>`;
                        return;
                    }
                    
                    // Organize tracking rows into your clean, classic table layout structure
                    const trackedStats = [
                        { name: "Stars", value: player.stars || 0 },
                        { name: "Diamonds", value: player.diamonds || 0 },
                        { name: "Secret Coins", value: player.coins || 0 },
                        { name: "User Coins", value: player.userCoins || 0 },
                        { name: "Demons Beaten", value: player.demons || 0 },
                        { name: "Creator Points", value: player.cp || 0 },
                        { name: "Global Rank", value: player.rank ? `#${player.rank.toLocaleString()}` : "Unranked" }
                    ];

                    tbody.innerHTML = '';
                    trackedStats.forEach(stat => {
                        tbody.innerHTML += `
                            <tr>
                                <td class="level-name">${stat.name}</td>
                                <td style="font-weight: bold; color: #fff;">${stat.value}</td>
                            </tr>`;
                    });
                })
                .catch(err => {
                    tbody.innerHTML = `<tr><td colspan="2" style="text-align:center; color:#ef4444;">Connection error to GD Browser servers.</td></tr>`;
                });
        };
    </script>
</body>
</html>
