<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Live Stats</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1 id="user-name"></h1>
            <p id="user-desc"></p>
        </header>

        <div class="nav-menu">
            <a href="index.html" class="nav-btn">Main</a>
            <a href="list.html" class="nav-btn">List</a>
            <a href="stats.html" class="nav-btn active">Stats</a>
            <a href="levels.html" class="nav-btn">Levels</a>
        </div>

        <div class="stats-grid" id="stats-container">
            <div class="stat-card" style="grid-column: span 2; color: var(--text-muted);">Loading player stats from GD Browser...</div>
        </div>
    </div>

    <script src="demonlist-data.js"></script>
    <script>
        window.onload = function() {
            initGlobalLayout();
            const container = document.getElementById('stats-container');

            // Hit the official GDBrowser profile parser engine
            fetch(`https://gdbrowser.com/api/profile/${DATA.gdUsername}`)
                .then(res => res.json())
                .then(player => {
                    if (!player || player.error) {
                        container.innerHTML = `<div class="stat-card" style="grid-column:span 2; color:#ef4444;">User profile data could not be retrieved.</div>`;
                        return;
                    }
                    
                    // Map out the targeted profile metrics variables
                    const trackedStats = {
                        "Stars": player.stars || 0,
                        "Diamonds": player.diamonds || 0,
                        "Secret Coins": player.coins || 0,
                        "User Coins": player.userCoins || 0,
                        "Demons Beaten": player.demons || 0,
                        "Creator Points": player.cp || 0,
                        "Global Rank": player.rank ? `#${player.rank}` : "Unranked"
                    };

                    container.innerHTML = '';
                    Object.entries(trackedStats).forEach(([key, val]) => {
                        container.innerHTML += `
                            <div class="stat-card">
                                <h4>${key}</h4>
                                <p>${val}</p>
                            </div>`;
                    });
                })
                .catch(err => {
                    container.innerHTML = `<div class="stat-card" style="grid-column:span 2; color:#ef4444;">Error connecting to GD Browser servers.</div>`;
                });
        };
    </script>
</body>
</html>
