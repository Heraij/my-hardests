<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Levels</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Makes the entire row clearly indicate it's an openable link */
        .clickable-row { cursor: pointer; }
        .clickable-row:hover td { background-color: var(--row-hover) !important; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1 id="user-name"></h1>
            <p id="user-desc"></p>
        </header>

        <div class="nav-menu">
            <a href="index.html" class="nav-btn">Main</a>
            <a href="list.html" class="nav-btn">List</a>
            <a href="stats.html" class="nav-btn">Stats</a>
            <a href="levels.html" class="nav-btn active">Levels</a>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Level Name</th>
                    <th>Downloads</th>
                    <th>Likes</th>
                    <th>Difficulty / Stars</th>
                </tr>
            </thead>
            <tbody id="all-levels-body">
                <tr><td colspan="4" style="text-align:center; color: var(--text-muted);">Scanning GD servers for published levels...</td></tr>
            </tbody>
        </table>
    </div>

    <script src="demonlist-data.js"></script>
    <script>
        window.onload = function() {
            initGlobalLayout();
            const tbody = document.getElementById('all-levels-body');

            fetch(`https://gdbrowser.com/api/search/${DATA.gdUsername}?user`)
                .then(res => res.json())
                .then(levels => {
                    if (!levels || !Array.isArray(levels) || levels.length === 0) {
                        tbody.innerHTML = `<tr><td colspan="4" style="text-align:center; color:var(--text-muted);">No uploaded levels found for this account.</td></tr>`;
                        return;
                    }

                    tbody.innerHTML = '';
                    levels.forEach(lvl => {
                        const starsText = lvl.stars > 0 ? ` (${lvl.stars}★)` : '';
                        
                        // Create row element manually to hook up cleanly with an open window tab command
                        const tr = document.createElement('tr');
                        tr.className = 'clickable-row';
                        tr.title = "Click to view on GD Browser";
                        tr.onclick = function() {
                            window.open(`https://gdbrowser.com/${lvl.id}`, '_blank');
                        };

                        tr.innerHTML = `
                            <td class="level-name">${lvl.name} <span style="font-size:0.8rem; color:var(--text-muted); display:block; margin-top:2px;">ID: ${lvl.id}</span></td>
                            <td class="creator-name">${lvl.downloads.toLocaleString()}</td>
                            <td class="creator-name" style="color: #4ade80;">${lvl.likes.toLocaleString()}</td>
                            <td style="font-weight:600; color:#fff;">${lvl.difficulty}${starsText}</td>
                        `;
                        tbody.appendChild(tr);
                    });
                })
                .catch(err => {
                    tbody.innerHTML = `<tr><td colspan="4" style="text-align:center; color:#ef4444;">Error reading level database records.</td></tr>`;
                });
        };
    </script>
</body>
</html>
